<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2d3139" />
      <stop offset="100%" stop-color="#15171c" />
    </linearGradient>
  </defs>

  <!-- Premium rounded squircle body with transparent outer padding -->
  <rect x="32" y="32" width="448" height="448" rx="120" fill="url(#bgGrad)" />

  <!-- Subtle glow ring border -->
  <rect x="32" y="32" width="448" height="448" rx="120" fill="none" stroke="#3e4451" stroke-width="12" opacity="0.8" />

  <!-- Command prompt ">" (vibrant white) -->
  <path d="M 160,170 L 256,256 L 160,342" fill="none" stroke="#ffffff" stroke-width="48" stroke-linecap="round" stroke-linejoin="round" />
  
  <!-- Underscore "_" cursor (vibrant blue for terminal accent) -->
  <line x1="288" y1="342" x2="368" y2="342" stroke="#3b82f6" stroke-width="48" stroke-linecap="round" />
</svg>
